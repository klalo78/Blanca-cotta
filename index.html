<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Libro Digital Interactivo</title>
    <style>
        body { 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; min-height: 100vh; margin: 0; 
            background-color: #121212; font-family: sans-serif; color: white; 
            overflow: hidden; 
        }
        
        .book-container { 
            position: relative; width: 100vw; max-width: 1200px; 
            height: 75vh; display: flex; justify-content: center; align-items: center; 
        }

        .sheet { 
            position: absolute; width: 100%; height: 100%; 
            display: none; justify-content: center; align-items: center; 
            gap: 0; 
        }

        .sheet.active { display: flex; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .sheet img { 
            max-height: 100%; 
            width: auto; 
            max-width: 50%; 
            object-fit: contain; 
            background: #000;
            display: block;
        }

        /* Efectos de lomo */
        .sheet:not(.single) img:first-child {
            border-radius: 5px 0 0 5px;
            box-shadow: inset -15px 0 30px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        .sheet:not(.single) img:last-child {
            border-radius: 0 5px 5px 0;
            box-shadow: inset 15px 0 30px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
        }

        .sheet.single img { 
            max-width: 85%; 
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .controls { 
            margin-top: 10px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            z-index: 10; 
            width: 100%;
            justify-content: center;
        }
        
        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            background: #2a2a2a; 
            color: white; 
            border: 1px solid #e74c3c; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: 0.2s; 
            touch-action: manipulation;
        }
        
        button:hover:not(:disabled) { background: #e74c3c; }
        button:disabled { opacity: 0.1; cursor: not-allowed; border-color: #444; }
        #page-info { font-family: monospace; color: #888; font-size: 14px; min-width: 120px; text-align: center; }

        /* AJUSTES PARA CELULAR */
        @media (max-width: 600px) {
            .book-container { height: 65vh; }
            .controls { position: fixed; bottom: 30px; gap: 8px; }
            button { 
                padding: 18px 25px; 
                font-size: 18px; 
                flex: 1; 
                max-width: 130px; 
            }
            #page-info { font-size: 12px; min-width: 70px; }
        }
    </style>
</head>
<body>

    <div class="book-container" id="book">
        </div>

    <div class="controls">
        <button id="prevBtn" onclick="changeSheet(-1)">Ģ Ant.</button>
        <span id="page-info">Cargando...</span>
        <button id="nextBtn" onclick="changeSheet(1)">Sig. ģ</button>
    </div>

    <script>
        const totalImages = 36; 
        const book = document.getElementById('book');
        const nombreCarpeta = "imagenes"; 

        function generateBook() {
            // Portada
            createSheet(['01'], true);

            // Interiores
            for (let i = 2; i <= 34; i += 2) {
                let img1 = i.toString().padStart(2, '0');
                let img2 = (i + 1).toString().padStart(2, '0');
                createSheet([img1, img2], false);
            }

            // Contraportada
            createSheet(['36'], true);
        }

        function createSheet(imgNames, isSingle) {
            const div = document.createElement('div');
            div.className = 'sheet' + (isSingle ? ' single' : '');
            
            imgNames.forEach(name => {
                const img = document.createElement('img');
                img.src = `${nombreCarpeta}/${name}.jpg`; 
                img.onerror = function() {
                    if (!this.triedOther) {
                        this.triedOther = true;
                        this.src = `${nombreCarpeta}/${name}.JPG`;
                    } else {
                        this.style.display = "none";
                    }
                };
                div.appendChild(img);
            });
            book.appendChild(div);
        }

        let currentIdx = 0;

        function updateUI() {
            const allSheets = document.querySelectorAll('.sheet');
            if(allSheets.length === 0) return;

            allSheets.forEach((sheet, index) => {
                sheet.classList.toggle('active', index === currentIdx);
            });
            document.getElementById('prevBtn').disabled = (currentIdx === 0);
            document.getElementById('nextBtn').disabled = (currentIdx === allSheets.length - 1);
            document.getElementById('page-info').innerText = `Pliego ${currentIdx + 1} de ${allSheets.length}`;
        }

        function changeSheet(dir) {
            currentIdx += dir;
            updateUI();
        }

        // Iniciar
        generateBook();
        updateUI();
    </script>
</body>
</html>
