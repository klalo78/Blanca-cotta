<style>
    body { 
        display: flex; flex-direction: column; justify-content: center; 
        align-items: center; min-height: 100vh; margin: 0; 
        background-color: #121212; font-family: sans-serif; color: white; 
        overflow: hidden; /* Evita scrolls innecesarios en el cel */
    }
    
    .book-container { 
        position: relative; width: 100vw; max-width: 1200px; 
        height: 80vh; display: flex; justify-content: center; align-items: center; 
    }

    .sheet { 
        position: absolute; width: 100%; height: 100%; 
        display: none; justify-content: center; align-items: center; 
        gap: 0; 
    }

    .sheet.active { display: flex; animation: fadeIn 0.4s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .sheet img { 
        max-height: 100%; 
        width: auto; 
        max-width: 50%; 
        object-fit: contain; 
        background: #000;
        display: block;
    }

    /* Efectos de lomo */
    .sheet:not(.single) img:first-child {
        border-radius: 5px 0 0 5px;
        box-shadow: inset -15px 0 30px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
    }

    .sheet:not(.single) img:last-child {
        border-radius: 0 5px 5px 0;
        box-shadow: inset 15px 0 30px rgba(0,0,0,0.5), 0 5px 15px rgba(0,0,0,0.3);
    }

    .sheet.single img { 
        max-width: 90%; 
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    /* --- CONTROLES --- */
    .controls { 
        margin-top: 5px; /* Pegado a la base del libro */
        display: flex; 
        align-items: center; 
        gap: 10px; 
        z-index: 10; 
        width: 100%;
        justify-content: center;
        padding-bottom: 10px;
    }
    
    button { 
        padding: 12px 25px; 
        cursor: pointer; 
        background: #333; 
        color: white; 
        border: 1px solid #555; 
        border-radius: 8px; 
        font-size: 16px; 
        transition: 0.2s; 
        touch-action: manipulation; /* Optimiza el toque en cel */
    }
    
    button:hover:not(:disabled) { background: #e74c3c; border-color: #e74c3c; }
    button:disabled { opacity: 0.1; cursor: not-allowed; }
    #page-info { font-family: monospace; color: #888; font-size: 14px; }

    /* --- AJUSTES ESPECÍFICOS PARA CELULAR --- */
    @media (max-width: 600px) {
        .book-container {
            height: 70vh; /* Un poco menos de alto para dar espacio a botones grandes */
        }

        .controls {
            gap: 5px;
            position: fixed; /* Lo fijamos abajo de todo */
            bottom: 20px;
        }

        button {
            padding: 20px 30px; /* BOTONES MÁS GRANDES */
            font-size: 18px;    /* TEXTO MÁS GRANDE */
            flex: 1;            /* Que ocupen el ancho disponible */
            max-width: 140px;
            background: #222;
            border: 2px solid #e74c3c; /* Borde más visible en cel */
        }

        #page-info {
            font-size: 12px;
            min-width: 80px;
        }
    }
</style>
